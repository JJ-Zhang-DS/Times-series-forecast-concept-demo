# Synthetic surgery counts: hospitals, specialties, date range, and pattern params.
# Used by src.data_generator.generate_surgery_counts().

date_range:
  start: "2021-01-01"
  end: "2023-12-31"

hospitals:
  - id: H1
    name: "City General"
  - id: H2
    name: "Metro Medical"
  - id: H3
    name: "Regional Care"

specialties:
  - id: S1
    name: "General Surgery"
    base_daily_mean: 12
    weekend_ratio: 0.4
    trend_per_year: 0.02
    noise_scale: 0.15
  - id: S2
    name: "Orthopedics"
    base_daily_mean: 8
    weekend_ratio: 0.35
    trend_per_year: 0.03
    noise_scale: 0.2
  - id: S3
    name: "Cardiology"
    base_daily_mean: 6
    weekend_ratio: 0.6
    trend_per_year: 0.05
    noise_scale: 0.12
  - id: S4
    name: "Neurology"
    base_daily_mean: 4
    weekend_ratio: 0.5
    trend_per_year: 0.01
    noise_scale: 0.25
  - id: S5
    name: "Emergency"
    base_daily_mean: 10
    weekend_ratio: 0.85
    trend_per_year: 0.0
    noise_scale: 0.3
  - id: S6
    name: "Ophthalmology"
    base_daily_mean: 5
    weekend_ratio: 0.2
    trend_per_year: 0.02
    noise_scale: 0.18

# Yearly seasonality: multiplier by month (1 = Jan ... 12 = Dec). Slight summer dip.
yearly_seasonality:
  - 1.05   # Jan
  - 0.98   # Feb
  - 1.02   # Mar
  - 1.0    # Apr
  - 0.97   # May
  - 0.92   # Jun
  - 0.90   # Jul
  - 0.93   # Aug
  - 1.0    # Sep
  - 1.05   # Oct
  - 1.08   # Nov
  - 1.0    # Dec

# Holidays: date (MM-DD) and optional name. Counts are scaled by holiday_ratio on these days.
holidays:
  - date: "01-01"
    name: "New Year"
  - date: "07-04"
    name: "Independence Day"
  - date: "12-25"
    name: "Christmas"
  - date: "11-24"
    name: "Thanksgiving"
  - date: "12-31"
    name: "New Year Eve"
holiday_ratio: 0.2

# Hospital scale: multiplies base volume per hospital (e.g. Metro Medical busier).
hospital_scale:
  H1: 1.0
  H2: 1.2
  H3: 0.85
